trigger:
  branches:
    include:
      - main
pool:
  vmImage: ubuntu-latest

stages:
- stage: Initialization
  displayName: Init & plan
  jobs:
  - job: initjob
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        backendServiceArm: 'portal-ado1'
        backendAzureRmResourceGroupName: 'stg-rg'
        backendAzureRmStorageAccountName: 'stgdemosatfstate'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.terraform.tfstate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        environmentServiceNameAzureRM: 'portal-ado1'

- stage: Approval
  displayName: "Approval"
  dependsOn: Initialization
  condition: succeeded()
  jobs:
  - job: Approval
    displayName: "Approval"
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 60
      displayName: "Approval Required"
      inputs:
        notifyUsers: 'abcd@gmail.com'
        instructions: 'Please Review code'

- stage: Applystage
  dependsOn: Approval
  displayName: Init & apply
  jobs:
  - job: applyjob
    steps:
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        backendServiceArm: 'portal-ado1'
        backendAzureRmResourceGroupName: 'stg-rg'
        backendAzureRmStorageAccountName: 'stgdemosatfstate'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.terraform.tfstate'
        
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
        environmentServiceNameAzureRM: 'portal-ado1'
